default_agent: myagent
agents:
  myagent:
    base:
      name: myagent
      entrypoint: agent:app
      dependency_file: requirements.txt
      region: cn-southwest-2
      platform: linux/amd64
      language: python3
      base_image: python:3.10-slim
      container_runtime: docker
    swr_config:
      organization_auto_create: true
      organization: agentarts-org-haolipeng
      repository_auto_create: true
      repository: agent_myagent
    runtime:
      invoke_config:
        protocol: HTTP
        port: 8080
      network_config:
        network_mode: PUBLIC
        vpc_config:
          vpc_id: null
          subnet_id: null
          security_group_id: []
      identity_configuration:
        authorizer_type: IAM
        authorizer_configuration:
          custom_jwt:
            discovery_url: null
            allowed_audience: []
            allowed_clients: []
            allowed_scopes: []
          key_auth:
            api_keys: []
      observability:
        tracing:
          enabled: true
        metrics:
          enabled: true
        logs:
          enabled: true
      artifact_source:
        url: swr.cn-southwest-2.myhuaweicloud.com/agentarts-org-haolipeng/agent_myagent:latest
        commands: []
      environment_variables:
      - key: OPENAI_API_KEY
        value: "mock-key"
      - key: OPENAI_MODEL_NAME
        value: "minimax-m2.5"
      - key: OPENAI_BASE_URL
        value: "https://api.minimaxi.com/v1"    
      tags: []
      agent_id: 392f4c12-1616-4540-996b-844faf3d818b
      agent_gateway_id: null
      execution_agency_name: null
